<!DOCTYPE html>
<html lang="en" class="bg-black text-cyan-500 overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER_v5 | REAL-TIME EXPLOIT NODES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        * { font-family: 'JetBrains Mono', monospace; scroll-behavior: smooth; }
        .crt::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 1000; pointer-events: none; opacity: 0.1; }
        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch { 0% { text-shadow: 2px 0 red; } 50% { text-shadow: -2px 0 blue; } 100% { text-shadow: 2px 0 red; } }
        .ad-slot { border: 1px solid #002222; background: #010101; text-align: center; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body class="crt min-h-screen relative flex flex-col p-4 bg-[#050505]">

    <div class="ad-slot w-full max-w-4xl mx-auto">
        <p class="text-[9px] text-gray-700 mb-1">ADVERTISEMENT / SPONSORED ENCRYPTION</p>
        <script src="https://pl29285251.profitablecpmratenetwork.com/87/26/b3/8726b38f7718785ee0f61ba0b85d6bc4.js"></script>
    </div>

    <header class="w-full max-w-6xl mx-auto flex justify-between text-[10px] opacity-50 mb-10">
        <div>UPLINK: <span id="user-ip" class="text-red-600">...</span></div>
        <div class="glitch">SYSTEM_STATUS: <span class="text-green-500">AGGRESSIVE</span></div>
    </header>

    <main id="main-interface" class="w-full max-w-4xl mx-auto space-y-8 z-10">
        <div class="text-center">
            <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter text-white">AETHER_v5</h1>
            <p class="text-xs text-cyan-900 tracking-[1em] mt-2">REAL-TIME DATA EXFILTRATION HUB</p>
        </div>

        <div class="bg-black border border-cyan-900 p-1">
            <div class="border border-cyan-900/30 p-6 space-y-4">
                <input type="text" id="target" placeholder="ENTER TARGET (IP, PHONE, OR URL)..." 
                       class="w-full bg-transparent border-b border-cyan-900 p-4 text-2xl text-cyan-400 outline-none focus:border-white transition-all uppercase">
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <button onclick="setService('IP_INTEL')" class="p-2 border border-cyan-900 text-[10px] hover:bg-cyan-900 hover:text-black">IP_SCANNER</button>
                    <button onclick="setService('GSM_LOC')" class="p-2 border border-cyan-900 text-[10px] hover:bg-cyan-900 hover:text-black">SIM_TRACKER</button>
                    <button onclick="setService('WEB_EXPLOIT')" class="p-2 border border-cyan-900 text-[10px] hover:bg-cyan-900 hover:text-black">WEB_VULN</button>
                    <button onclick="setService('SMS_INTERCEPT')" class="p-2 border border-cyan-900 text-[10px] hover:bg-cyan-900 hover:text-black">SMS_GATEWAY</button>
                </div>

                <button onclick="startOperation()" class="w-full bg-cyan-600 text-black py-5 font-black text-2xl shadow-[0_0_30px_rgba(0,255,255,0.2)]">EXECUTE_OPERATION</button>
            </div>
        </div>

        <div class="ad-slot">
            <script src="https://pl29285251.profitablecpmratenetwork.com/87/26/b3/8726b38f7718785ee0f61ba0b85d6bc4.js"></script>
        </div>
    </main>

    <div id="terminal-screen" class="hidden fixed inset-0 bg-black z-50 p-6 flex flex-col">
        <div id="terminal-logs" class="flex-grow overflow-y-auto text-[11px] text-green-500 space-y-1 font-mono"></div>
        <div class="h-2 bg-gray-900 mt-4"><div id="bar" class="h-full bg-green-500 w-0"></div></div>
    </div>

    <div id="results-screen" class="hidden fixed inset-0 bg-black z-[60] p-8 flex flex-col items-center justify-center space-y-6 overflow-y-auto">
        <h2 class="text-4xl font-black text-white italic underline">EXFILTRATED_DATA</h2>
        <div id="real-data-output" class="w-full max-w-2xl bg-zinc-950 border border-green-900 p-6 text-green-400 text-sm font-mono whitespace-pre-wrap"></div>
        
        <div class="ad-slot w-full">
            <p class="text-red-500 text-[10px] mb-2 font-bold animate-pulse">! CLOUD_SYNC_PENDING: CLICK BELOW TO UNLOCK FULL REPORT !</p>
            <button onclick="finalizeAndEarn()" class="bg-red-600 text-white px-10 py-4 font-black text-xl hover:bg-white hover:text-black transition-all">UNLOCK_MASTER_LOG</button>
        </div>
    </div>

    <script src="v5-core.js"></script>
</body>
</html>
